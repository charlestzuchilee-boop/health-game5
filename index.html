<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健康小學堂 - 知識測驗</title>
    <style>
        :root {
            --primary-color: #4CAF50;
            --secondary-color: #2196F3;
            --bg-color: #f4f7f6;
            --text-color: #333;
        }

        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        #quiz-container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 500px;
            text-align: center;
        }

        .header {
            margin-bottom: 2rem;
        }

        .progress-bar {
            height: 10px;
            background: #eee;
            border-radius: 5px;
            margin-bottom: 1rem;
            overflow: hidden;
        }

        #progress {
            height: 100%;
            background: var(--primary-color);
            width: 0%;
            transition: width 0.3s ease;
        }

        .question {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 1.5rem;
            min-height: 3em;
        }

        .options-grid {
            display: grid;
            gap: 10px;
        }

        .option-btn {
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
        }

        .option-btn:hover {
            border-color: var(--secondary-color);
            background-color: #e3f2fd;
        }

        .option-btn.correct {
            background-color: #c8e6c9;
            border-color: #4CAF50;
        }

        .option-btn.wrong {
            background-color: #ffcdd2;
            border-color: #f44336;
        }

        #result-screen {
            display: none;
        }

        .score-text {
            font-size: 2rem;
            color: var(--primary-color);
            margin: 1rem 0;
        }

        button#restart-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
        }

        button#restart-btn:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

<div id="quiz-container">
    <!-- 遊戲進行畫面 -->
    <div id="quiz-screen">
        <div class="header">
            <h2>🍎 健康小學堂</h2>
            <div class="progress-bar"><div id="progress"></div></div>
            <p>第 <span id="current-idx">1</span> 題 / 共 <span id="total-idx">5</span> 題</p>
        </div>
        
        <div class="question" id="question-text">載入中...</div>
        
        <div class="options-grid" id="options-container">
            <!-- 選項會動態生成 -->
        </div>
    </div>

    <!-- 結果結算畫面 -->
    <div id="result-screen">
        <h2>測驗結束！</h2>
        <div class="score-text">得分：<span id="final-score">0</span></div>
        <p id="feedback-msg"></p>
        <button id="restart-btn" onclick="resetQuiz()">再玩一次</button>
    </div>
</div>

<script>
    // 題目資料庫
    const quizData = [
        {
            q: "成人每日建議飲水量大約是多少？",
            options: ["500ml", "1000ml", "體重(kg) × 30-35ml", "越多越好，沒有上限"],
            correct: 2
        },
        {
            q: "下列哪種維生素有助於幫助鈣質吸收？",
            options: ["維生素 A", "維生素 C", "維生素 D", "維生素 B12"],
            correct: 2
        },
        {
            q: "「天天五蔬果」是指每天要吃多少？",
            options: ["3份蔬菜+2份水果", "5份水果", "5份蔬菜", "1份蔬菜+4份水果"],
            correct: 0
        },
        {
            q: "關於睡眠，下列何者敘述正確？",
            options: ["睡前滑手機有助眠效果", "週末補眠可以抵消週間熬夜", "規律的作息有助於生理時鐘", "成年人只需睡4小時就夠"],
            correct: 2
        },
        {
            q: "健康的 BMI (身體質量指數) 範圍是多少？",
            options: ["15-18.5", "18.5-24", "24-27", "27-30"],
            correct: 1
        }
    ];

    let currentQuestion = 0;
    let score = 0;
    let canClick = true;

    const questionEl = document.getElementById('question-text');
    const optionsContainer = document.getElementById('options-container');
    const progressEl = document.getElementById('progress');
    const currentIdxEl = document.getElementById('current-idx');
    const totalIdxEl = document.getElementById('total-idx');
    const quizScreen = document.getElementById('quiz-screen');
    const resultScreen = document.getElementById('result-screen');

    function initQuiz() {
        totalIdxEl.innerText = quizData.length;
        loadQuestion();
    }

    function loadQuestion() {
        canClick = true;
        const currentData = quizData[currentQuestion];
        
        // 更新進度與文字
        questionEl.innerText = currentData.q;
        currentIdxEl.innerText = currentQuestion + 1;
        progressEl.style.width = `${((currentQuestion) / quizData.length) * 100}%`;
        
        // 清除舊選項
        optionsContainer.innerHTML = '';
        
        // 生成新選項
        currentData.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.classList.add('option-btn');
            btn.innerText = opt;
            btn.onclick = () => handleAnswer(index, btn);
            optionsContainer.appendChild(btn);
        });
    }

    function handleAnswer(selectedIdx, btn) {
        if (!canClick) return;
        canClick = false;

        const correctIdx = quizData[currentQuestion].correct;
        
        if (selectedIdx === correctIdx) {
            btn.classList.add('correct');
            score += 20;
        } else {
            btn.classList.add('wrong');
            optionsContainer.children[correctIdx].classList.add('correct');
        }

        // 延遲一秒進入下一題
        setTimeout(() => {
            currentQuestion++;
            if (currentQuestion < quizData.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }, 1200);
    }

    function showResults() {
        quizScreen.style.display = 'none';
        resultScreen.style.display = 'block';
        document.getElementById('final-score').innerText = score;
        
        let msg = "";
        if (score === 100) msg = "太強了！你是健康達人！🌿";
        else if (score >= 60) msg = "表現不錯，繼續保持健康生活！💪";
        else msg = "要多注意健康知識喔，加油！🍎";
        
        document.getElementById('feedback-msg').innerText = msg;
    }

    function resetQuiz() {
        currentQuestion = 0;
        score = 0;
        quizScreen.style.display = 'block';
        resultScreen.style.display = 'none';
        loadQuestion();
    }

    // 啟動
    initQuiz();
</script>

</body>
</html>
